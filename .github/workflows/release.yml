name: Release

# Bumps the version, updates CHANGELOG.md, tags the commit, and opens a DRAFT
# GitHub Release from Conventional Commits. Review and publish the draft manually.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Conventional Changelog
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: "CHANGELOG.md"
          version-file: "package.json"
          skip-version-file: "false"
          skip-on-empty: "true"
          tag-prefix: "v"
          # [skip ci] keeps the changelog commit from re-triggering this workflow.
          git-message: "chore(release): {version} [skip ci]"
          git-user-name: github-actions[bot]
          git-user-email: github-actions[bot]@users.noreply.github.com

      - name: Create draft GitHub Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          draft: false
          prerelease: false
