name: Bug report
description: Report a problem with CommitArc
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        ⚠️ Please **do not** paste API keys, tokens, or private-repo data — redact anything sensitive.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: repo-type
    attributes:
      label: Repository type
      options:
        - Public
        - Private (via gh CLI)
        - Not applicable
  - type: dropdown
    id: provider
    attributes:
      label: AI provider (if relevant)
      options:
        - Local Claude
        - Server key (ANTHROPIC_API_KEY)
        - GUI key
        - Not applicable
  - type: input
    id: model
    attributes:
      label: Model (if relevant)
      placeholder: claude-opus-4-8
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, browser, and CommitArc version or commit.
      placeholder: |
        - OS: macOS 15
        - Node: 20.x
        - Browser: Chrome 120
        - CommitArc: v1.1.0 (or commit hash)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or screenshots. Redact secrets.
      render: shell
